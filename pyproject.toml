[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F811"]  # allow fixture redefinition in tests
"cli/main.py" = ["E402"]  # intentional: stdout encoding must be set before imports

[tool.pytest.ini_options]
testpaths = ["tests"]
